<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p>Real-time weather information and forecasts</p>
        </header>

        <div class="weather-input">
            <div class="input-group">
                <input type="text" id="cityInput" placeholder="Enter city name..." value="agra">
                <input type="number" id="dayInput" placeholder="Days" value="3" min="1" max="7">
                <button onclick="fetchWeather()" class="fetch-btn">
                    <i class="fas fa-search"></i> Get Weather
                </button>
            </div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>

        <div class="weather-content" id="weatherContent" style="display: none;">
            <!-- Current Weather Section -->
            <div class="current-weather">
                <div class="current-header">
                    <h2>Current Weather</h2>
                    <div class="last-updated" id="lastUpdated"></div>
                </div>
                
                <div class="current-info">
                    <div class="location-info">
                        <h3 id="cityName"></h3>
                        <p id="regionCountry"></p>
                    </div>
                    
                    <div class="temp-info">
                        <div class="main-temp">
                            <span id="currentTemp"></span>°C
                        </div>
                        <div class="condition">
                            <i id="weatherIcon" class="fas fa-cloud"></i>
                            <span id="weatherCondition"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Forecast Section -->
            <div class="forecast-section">
                <h2>Weather Forecast</h2>
                <div class="forecast-container" id="forecastContainer">
                    <!-- Forecast cards will be dynamically generated -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
